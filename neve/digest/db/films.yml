  - date: 2026-05-05
    category: [Film]
    author: Stanley Kramer
    title: "Guess Who's Coming to Dinner"
    url: https://en.wikipedia.org/wiki/Guess_Who%27s_Coming_to_Dinner
    year: 1967
    tags: [drama, romance, race, civil-rights, favourite]
    notes: |
      A young white woman returns from Hawaii engaged to a Black widower (Sidney Poitier) she met ten days prior, and brings him home to San Francisco to meet her liberal parents (Spencer Tracy, Katharine Hepburn). The entire film unfolds over a single afternoon and evening, hinging on whether the parents will give their blessing before he leaves for Geneva.

      The drama works on multiple registers: the generational gap between stated progressive values and the visceral discomfort of actually living them; Poitier's character written as so impeccably credentialed as to be "undeniable" — a conscious strategy that drew later criticism for sidestepping the question of whether a less exceptional Black man would deserve the same welcome. Tracy's final monologue is the emotional center. Hepburn won the Academy Award for Best Actress; Tracy died seventeen days after filming wrapped and never saw the finished film. Selected for the National Film Registry in 2017.

  - date: 2026-05-05
    category: [Film]
    author: Paul Thomas Anderson
    title: Phantom Thread
    url: https://en.wikipedia.org/wiki/Phantom_Thread
    year: 2017
    tags: [drama, romance, obsession, favourite]
    notes: |
      1950s London. Reynolds Woodcock (Daniel Day-Lewis) is a meticulous haute couture dressmaker — controlled, ritualistic, emotionally sealed. He meets Alma (Vicky Krieps), a waitress who becomes his muse and lover. What begins as a familiar story of an artist and his subject inverts: Alma refuses to be a passive fixture in his world, and the film slowly reveals the power she holds over him.

      The central relationship is a study in control, need, and the strange contracts people build around each other. The poisoning plot is not a twist so much as a clarification — she has found the one way to reach him, the one state in which he becomes soft and dependent. Day-Lewis reportedly announced his retirement from acting after this film. Lesley Manville as the sister Cyril is quietly the film's spine. Won the Academy Award for Best Costume Design; nominated for Best Picture, Director, Actor, and Supporting Actress.
