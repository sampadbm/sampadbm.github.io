readings:
  - date: 2026-03-29
    category: [Statistics, History, Mathematics]
    author: Simon Raper
    title: The Shock of the Mean
    url: https://web.stanford.edu/class/datasci112/readings/mean.pdf
    year: 2017
    tags: [arithmetic-mean, history-of-statistics, average, ergodic-fallacy]
    notes: |
      "A statistical average is a thing so familiar to us now, spilling out of news bulletins, government reports, and business presentations, that it seems odd that it was ever in need of justification. But, to the scientists of the eighteenth century, the use of the arithmetical mean to summarise data was anything but obvious." Raper traces the surprisingly contentious history of the arithmetic mean — from its absence in Greek and Roman mathematics, through centuries of resistance by astronomers who preferred selecting the single best observation, to Quetelet's radical leap of applying it to people. The article warns of the "ergodic switch": the dangerous assumption that the properties of a group can be used to make predictions about its individual members.

