<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading... - Sampy's Blog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=EB+Garamond:wght@400;500&display=swap" rel="stylesheet">
    <!-- KaTeX CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" crossorigin="anonymous">
    <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
    <main>
        <header class="post-header">
            <h1 class="post-title" id="post-title">Loading...</h1>
            <div class="post-summary" id="post-summary">
                <!-- Populated by JS if summary exists -->
            </div>
            <div class="post-meta-line" id="post-metadata">
                <!-- Populated by JS: "March 7, 2026 · math, linear-algebra" -->
            </div>
        </header>
        <aside class="post-sidebar" id="post-sidebar">
            <nav class="sidebar-toc" id="sidebar-toc">
                <div class="toc-title">Contents</div>
                <ul class="toc-list" id="toc-list">
                    <!-- Generated from headings -->
                </ul>
            </nav>
        </aside>
        <article class="post-body">
            <div class="post-content" id="post-content">
                <div class="loading-indicator">Loading post...</div>
            </div>
        </article>
    </main>

    <footer class="post-footer">
        <a href="index.html" class="back-link">← Back to all posts</a>
        <div class="shortcuts-hint">
            Shortcuts: <kbd>a</kbd> alignment · <kbd>l</kbd> layout · <kbd>t</kbd> theme · <kbd>b</kbd> back
        </div>
    </footer>

    <!-- js-yaml for YAML parsing -->
    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
    <!-- marked for Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
    <!-- KaTeX for LaTeX rendering -->
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" crossorigin="anonymous"></script>
    <!-- KaTeX auto-render for $...$ and $$...$$ delimiters -->
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js" crossorigin="anonymous"></script>
    <script src="assets/utils.js"></script>
    <script src="assets/post.js"></script>
</body>
</html>
