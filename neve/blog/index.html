<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sampy's Blog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=EB+Garamond:wght@400;500&display=swap" rel="stylesheet">
    <!-- KaTeX CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" crossorigin="anonymous">
    <link rel="stylesheet" href="../siteutils/modal-filter.css">
    <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
    <header>
        <h1>Sampy's Blog</h1>
        <p class="header-subtitle">Notes on math, machine learning, and other curiosities</p>
        <div class="shortcuts-container">
            <div class="shortcut-hint" id="folder-hint"><kbd>t</kbd> theme</div>
            <div class="shortcut-hint" id="modal-filter-open-btn" role="button" tabindex="0"><kbd>f</kbd> filter</div>
        </div>
    </header>

    <div class="landing-split">
        <div class="landing-browser">
            <div class="browser-title">Browse</div>
            <div id="tree-container" class="tree-container">
                <!-- Folder tree will be populated here -->
            </div>
        </div>
        <div class="landing-posts">
            <!-- Removed old ugly filter button -->

            <main id="posts-container">
                <!-- Blog posts will be populated here -->
            </main>
        </div>
    </div>

    <!-- js-yaml for YAML parsing -->
    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
    <!-- marked for Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
    <!-- KaTeX for LaTeX rendering -->
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" crossorigin="anonymous"></script>
    <!-- KaTeX auto-render for $...$ and $$...$$ delimiters -->
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js" crossorigin="anonymous"></script>
    <script src="assets/utils.js"></script>
    <script src="../siteutils/modal-filter.js"></script>
    <script src="assets/app.js"></script>
</body>
</html>
