ToBeDetermined:
        - The only ways we know how to understand behaviour of a complex system are the following. By superposition of behaviour of its components. Or by abstracting the whole system as a blackbox and modelling its input output via a mapping (transfer function). The third way is by the way of transference -  indentifying a homomorphism between another well understood complex system that we understand and the one currently under study to directly borrow well understood properties of the well understood system onto the system under study (this is the most satisfying intellectually to me)
